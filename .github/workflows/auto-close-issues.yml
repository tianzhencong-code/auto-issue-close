name: Auto Close Labeled Issues

# Trigger: whenever a label is added to an issue
on:
  issues:
    types: [labeled]

jobs:
  close-issue:
    runs-on: ubuntu-latest

    # Only run when the label is 'completed' or 'wontfix'
    if: >
      github.event.label.name == 'completed' ||
      github.event.label.name == 'wontfix'

    steps:
      - name: Close the issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labelName = context.payload.label.name;
            const issueNumber = context.payload.issue.number;

            // Add a comment explaining why the issue was closed
            let message = '';
            if (labelName === 'completed') {
              message = '✅ This issue has been labeled **completed** and is now being closed automatically. Great work!';
            } else if (labelName === 'wontfix') {
              message = '🚫 This issue has been labeled **wontfix** and is now being closed automatically. No further action will be taken.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: message
            });

            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });

            console.log(`Issue #${issueNumber} closed due to label: ${labelName}`);
